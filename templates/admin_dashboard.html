<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - CropHealth AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .dashboard-container { margin-top: 50px; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🥔 CropHealth AI - Admin Panel</a>
        <a href="/" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container dashboard-container">
    <h2 class="mb-4">Prediction History</h2>
    <p class="text-muted">Total records found in database.</p>
    
    <div class="table-responsive">
        <table class="table table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>File Name</th>
                    <th>Result</th>
                    <th>Confidence</th>
                    <th>Date & Time</th>
                </tr>
            </thead>
            <tbody>
                {% for row in history %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td><span class="badge {% if 'Invalid' in row[2] %}bg-danger{% else %}bg-success{% endif %}">{{ row[2] }}</span></td>
                    <td>{{ "%.2f"|format(row[3] * 100) }}%</td>
                    <td>{{ row[4] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>

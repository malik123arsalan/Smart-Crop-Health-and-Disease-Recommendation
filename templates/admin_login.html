<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container card p-4 shadow-sm" style="max-width: 400px;">
        <h2 class="text-center mb-4">Admin Login</h2>
        <form action="/admin_dashboard" method="post">
            <input type="password" name="password" class="form-control mb-3" placeholder="Enter Password" required>
            <button type="submit" class="btn btn-dark w-100">Login</button>
        </form>
        {% if error %}<p class="text-danger mt-2 text-center">{{ error }}</p>{% endif %}
    </div>
</body>
</html>
